<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:32px;font-family:'IBM Plex Sans',system-ui,sans-serif;background:#16273d;background-image:radial-gradient(1200px 600px at 78% -10%, #1f3757 0%, #16273d 60%);color:#16202e;">
  <div style="width:100%;max-width:840px;display:grid;grid-template-columns:1.05fr 1fr;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 30px 70px rgba(9,18,33,.45);">

    <!-- Painel esquerdo · marca + formulário -->
    <div style="padding:38px 38px 34px;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:30px;">
        <div style="width:38px;height:38px;border-radius:10px;background:#16273d;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;">OB</div>
        <div>
          <div style="font-size:16px;font-weight:600;letter-spacing:.01em;">Gestão de Obras</div>
          <div style="font-size:11px;color:#8a94a6;font-family:'IBM Plex Mono',monospace;">controlo financeiro</div>
        </div>
      </div>

      <h1 style="margin:0 0 5px;font-size:21px;font-weight:600;letter-spacing:-.01em;">Iniciar sessão</h1>
      <p style="margin:0 0 22px;font-size:13px;color:#8a94a6;line-height:1.5;">Entre com a sua conta para aceder à carteira de obras.</p>

      <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;">Utilizador</label>
      <input type="text" value="{{ vm.userVal }}" onInput="{{ vm.onUser }}" onKeyDown="{{ vm.onKey }}" placeholder="ex.: antonio" autocomplete="username" style="margin-top:7px;margin-bottom:15px;border:1px solid #d3dae4;border-radius:9px;background:#fafbfc;font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:#16202e;padding:11px 13px;outline:none;width:100%;" style-focus="border-color:#2f6fed;background:#fff;">

      <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;">Palavra-passe</label>
      <input type="password" value="{{ vm.passVal }}" onInput="{{ vm.onPass }}" onKeyDown="{{ vm.onKey }}" placeholder="••••••••" autocomplete="current-password" style="margin-top:7px;border:1px solid #d3dae4;border-radius:9px;background:#fafbfc;font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:#16202e;padding:11px 13px;outline:none;width:100%;" style-focus="border-color:#2f6fed;background:#fff;">

      <sc-if value="{{ vm.temErro }}" hint-placeholder-val="{{ false }}">
        <div style="margin-top:12px;display:flex;align-items:center;gap:8px;font-size:12.5px;line-height:1.4;padding:9px 12px;border-radius:8px;background:#fdeeec;border-left:3px solid #cf4b3a;color:#9a2a1c;">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 4.5v4M8 11h.01" stroke="#cf4b3a" stroke-width="1.6" stroke-linecap="round"/><circle cx="8" cy="8" r="6" stroke="#cf4b3a" stroke-width="1.3"/></svg>
          <span>{{ vm.erro }}</span>
        </div>
      </sc-if>

      <button type="button" onClick="{{ vm.onEntrar }}" style="margin-top:18px;border:none;background:#2f6fed;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:14.5px;font-weight:600;padding:12px 18px;border-radius:10px;cursor:pointer;width:100%;" style-hover="filter:brightness(1.06);" style-active="filter:brightness(.95);">Entrar</button>

      <div style="margin-top:16px;font-size:11.5px;color:#a4adbd;line-height:1.6;">
        Palavra-passe inicial <span style="font-family:'IBM Plex Mono',monospace;color:#56627a;">= nome de utilizador</span>.
      </div>
    </div>

    <!-- Painel direito · escolher conta -->
    <div style="background:#f5f7fb;border-left:1px solid #e4e8ef;padding:30px 26px;display:flex;flex-direction:column;">
      <div style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#8a94a6;font-weight:600;margin-bottom:14px;">Contas</div>
      <div style="display:flex;flex-direction:column;gap:8px;overflow-y:auto;">
        <sc-for list="{{ vm.contas }}" as="c" hint-placeholder-count="6">
          <button type="button" onClick="{{ c.onClick }}" style="{{ c.rowStyle }}">
            <span style="{{ c.avatarStyle }}">{{ c.iniciais }}</span>
            <span style="min-width:0;flex:1;">
              <span style="{{ c.nomeStyle }}">{{ c.nome }}</span>
              <span style="display:block;{{ c.papelStyle }}">{{ c.papelLabel }}</span>
            </span>
          </button>
        </sc-for>
      </div>
      <div style="margin-top:auto;padding-top:16px;font-size:11px;color:#a4adbd;line-height:1.6;">
        Clique numa conta para preencher o utilizador.
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:840,&quot;height&quot;:560}}"></script>
</body>
</html>
