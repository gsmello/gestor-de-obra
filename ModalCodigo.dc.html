<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div onClick="{{ vm.onClose }}" style="position:fixed;inset:0;background:rgba(16,32,62,.4);z-index:210;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#16202e;">
  <div onClick="{{ vm.stopPropagation }}" style="background:#fff;border-radius:14px;width:440px;box-shadow:0 16px 60px rgba(0,0,0,.2);display:flex;flex-direction:column;overflow:hidden;">
    <div style="padding:18px 24px;border-bottom:1px solid #e0e5ee;display:flex;justify-content:space-between;align-items:center;">
      <h2 style="margin:0;font-size:17px;font-weight:600;">{{ vm.heading }}</h2>
      <button type="button" onClick="{{ vm.onClose }}" style="border:1px solid #e0e5ee;background:#fff;color:#56627a;font-size:20px;line-height:1;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:system-ui;flex:none;">×</button>
    </div>
    <div style="padding:20px 24px;display:flex;flex-direction:column;gap:16px;">
      <div style="background:#f7f9fc;border:1px solid #eef1f5;border-radius:10px;padding:12px 15px;">
        <div style="font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ vm.titulo }}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#8a94a6;">{{ vm.obraCodigo }}</span>
          <span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;background:#eef1f5;color:#16273d;">{{ vm.itemLabel }}</span>
          <span style="margin-left:auto;font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;">{{ vm.valorFmt }}</span>
        </div>
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;display:block;margin-bottom:8px;">{{ vm.heading }} *</label>
        <input type="text" value="{{ vm.cod }}" onInput="{{ vm.onCod }}" onKeyDown="{{ vm.onKey }}" placeholder="{{ vm.placeholder }}" autofocus style="border:1px solid #d3dae4;border-radius:8px;padding:11px 14px;font-family:'IBM Plex Mono',monospace;font-size:15px;color:#16202e;outline:none;background:#fff;width:100%;">
        <p style="margin:9px 0 0;font-size:12px;color:#a4adbd;line-height:1.5;">{{ vm.sub }} Sem código não é possível emitir.</p>
      </div>
    </div>
    <div style="padding:15px 24px;border-top:1px solid #e0e5ee;display:flex;justify-content:flex-end;gap:10px;background:#f7f9fc;">
      <button type="button" onClick="{{ vm.onClose }}" style="border:1px solid #d3dae4;background:#fff;color:#56627a;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:500;padding:9px 20px;border-radius:8px;cursor:pointer;">Cancelar</button>
      <button type="button" onClick="{{ vm.onSave }}" style="{{ vm.saveBtnStyle }}">{{ vm.confirmLabel }}</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:360}}"></script>
</body>
</html>
