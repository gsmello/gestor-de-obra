<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div onClick="{{ vm.onClose }}" style="position:fixed;inset:0;background:rgba(16,32,62,.4);z-index:200;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#16202e;">
  <div onClick="{{ vm.stopPropagation }}" style="background:#fff;border-radius:14px;width:520px;box-shadow:0 16px 60px rgba(0,0,0,.2);display:flex;flex-direction:column;max-height:90vh;overflow:hidden;">
    <div style="padding:18px 24px;border-bottom:1px solid #e0e5ee;display:flex;justify-content:space-between;align-items:center;">
      <h2 style="margin:0;font-size:17px;font-weight:600;">Adicionar custo</h2>
      <button type="button" onClick="{{ vm.onClose }}" style="border:1px solid #e0e5ee;background:#fff;color:#56627a;font-size:20px;line-height:1;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:system-ui;flex:none;">×</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:18px;">
      <div>
        <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;display:block;margin-bottom:8px;">Data</label>
        <input type="date" value="{{ vm.date }}" onInput="{{ vm.onDate }}" style="border:1px solid #d3dae4;border-radius:8px;padding:9px 13px;font-family:'IBM Plex Mono',monospace;font-size:14px;color:#16202e;outline:none;background:#fff;width:100%;">
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;display:block;margin-bottom:8px;">Categoria</label>
        <div style="display:flex;gap:7px;flex-wrap:wrap;">
          <sc-for list="{{ vm.cats }}" as="cat" hint-placeholder-count="5">
            <button type="button" onClick="{{ cat.onClick }}" style="{{ cat.style }}">{{ cat.label }}</button>
          </sc-for>
        </div>
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;display:block;margin-bottom:8px;">Descrição *</label>
        <input type="text" value="{{ vm.descricao }}" onInput="{{ vm.onDescricao }}" placeholder="Ex: Betão pronto, tubo PVC DN100, alvenaria..." style="border:1px solid #d3dae4;border-radius:8px;padding:10px 13px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:#16202e;outline:none;background:#fff;width:100%;">
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;display:block;margin-bottom:8px;">Fornecedor / Subempreiteiro</label>
        <input type="text" value="{{ vm.fornecedor }}" onInput="{{ vm.onFornecedor }}" placeholder="Nome do fornecedor (opcional)" style="border:1px solid #d3dae4;border-radius:8px;padding:10px 13px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:#16202e;outline:none;background:#fff;width:100%;">
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8a94a6;font-weight:600;display:block;margin-bottom:8px;">Valor (€) *</label>
        <div style="display:flex;align-items:center;border:1.5px solid #d3dae4;border-radius:9px;padding:0 14px;background:#fafbfc;">
          <span style="color:#8a94a6;font-family:'IBM Plex Mono',monospace;margin-right:8px;font-size:16px;">€</span>
          <input type="text" inputmode="decimal" value="{{ vm.valor }}" placeholder="0,00" onInput="{{ vm.onValor }}" style="flex:1;border:none;outline:none;background:transparent;font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#16202e;padding:11px 0;font-variant-numeric:tabular-nums;width:100%;">
        </div>
      </div>
    </div>
    <div style="padding:15px 24px;border-top:1px solid #e0e5ee;display:flex;justify-content:flex-end;gap:10px;background:#f7f9fc;">
      <button type="button" onClick="{{ vm.onClose }}" style="border:1px solid #d3dae4;background:#fff;color:#56627a;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:500;padding:9px 20px;border-radius:8px;cursor:pointer;">Cancelar</button>
      <button type="button" onClick="{{ vm.onSave }}" style="{{ vm.saveBtnStyle }}">Guardar custo</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:620}}"></script>
</body>
</html>
