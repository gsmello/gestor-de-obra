<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<aside style="width:100%;background:#16273d;display:flex;flex-direction:column;height:100vh;font-family:'IBM Plex Sans',system-ui,sans-serif;">
  <div style="padding:22px 20px 18px;display:flex;align-items:center;gap:11px;">
    <div style="{{ vm.brandStyle }}">OB</div>
    <div>
      <div style="font-size:15px;font-weight:600;color:#fff;letter-spacing:.01em;">Gestão de Obras</div>
      <div style="font-size:11px;color:#6f819b;font-family:'IBM Plex Mono',monospace;">controlo financeiro</div>
    </div>
  </div>
  <div style="padding:6px 14px 2px;">
    <div onClick="{{ vm.onGoCarteira }}" style="{{ vm.carteiraNavStyle }}">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.4" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.4" fill="currentColor" opacity="0.55"/><rect x="1" y="9" width="6" height="6" rx="1.4" fill="currentColor" opacity="0.55"/><rect x="9" y="9" width="6" height="6" rx="1.4" fill="currentColor"/></svg>
      <span>Carteira de obras</span>
    </div>
    <sc-if value="{{ vm.temFatNav }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ vm.fatNav.onClick }}" style="{{ vm.fatNav.style }}">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 2.2h7.2L13 5v8.8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V3.2a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M9.8 2.2V5H13M5.5 8h5M5.5 10.6h3.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Faturação</span>
      <sc-if value="{{ vm.fatNav.temPend }}" hint-placeholder-val="{{ true }}">
      <span style="{{ vm.fatNav.countStyle }}">{{ vm.fatNav.count }}</span>
      </sc-if>
    </div>
    </sc-if>
    <sc-if value="{{ vm.temAprovNav }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ vm.aprovNav.onClick }}" style="{{ vm.aprovNav.style }}">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1.6l5.2 2.1v3.5c0 3-2.1 5.4-5.2 6.6-3.1-1.2-5.2-3.6-5.2-6.6V3.7L8 1.6z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="m5.8 7.9 1.6 1.6 3-3.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Aprovação</span>
      <sc-if value="{{ vm.aprovNav.temPend }}" hint-placeholder-val="{{ true }}">
      <span style="{{ vm.aprovNav.countStyle }}">{{ vm.aprovNav.count }}</span>
      </sc-if>
    </div>
    </sc-if>
  </div>
  <div style="padding:18px 22px 7px;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:#56688a;font-weight:600;">Obras</div>
  <div style="flex:1;overflow-y:auto;padding:0 12px 16px;">
    <sc-for list="{{ vm.navObras }}" as="o" hint-placeholder-count="8">
      <div onClick="{{ o.onClick }}" style="{{ o.style }}">
        <span style="{{ o.dotStyle }}"></span>
        <div style="min-width:0;flex:1;">
          <div style="{{ o.tituloStyle }}">{{ o.titulo }}</div>
          <div style="{{ o.codigoStyle }}">{{ o.codigo }}</div>
        </div>
      </div>
    </sc-for>
  </div>
  <div style="border-top:1px solid #233650;padding:12px 14px;">
    <div style="display:flex;align-items:center;gap:10px;padding:6px 6px 6px 6px;">
      <span style="{{ vm.utilizador.avatarStyle }}">{{ vm.utilizador.iniciais }}</span>
      <div style="min-width:0;flex:1;">
        <div style="{{ vm.utilizador.nomeStyle }}">{{ vm.utilizador.nome }}</div>
        <div style="{{ vm.utilizador.papelStyle }}">{{ vm.utilizador.papelLabel }}</div>
      </div>
      <button type="button" onClick="{{ vm.utilizador.onSair }}" title="Terminar sessão" style="flex:none;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid #2c405c;background:transparent;color:#7e90ac;border-radius:8px;cursor:pointer;padding:0;" style-hover="border-color:#3d5474;color:#cdd9ea;background:#1c2f49;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2.5H3.5a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1H6M10.5 11l3-3-3-3M13 8H6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:248,&quot;height&quot;:760}}"></script>
</body>
</html>
