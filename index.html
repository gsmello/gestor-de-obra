<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:#eef1f5;-webkit-font-smoothing:antialiased;}
::selection{background:#cfe0ff;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
@media print {
  body * { visibility: hidden !important; }
  .auto-print-overlay, .auto-print-overlay * { visibility: visible !important; }
  .auto-print-overlay { position: absolute !important; inset: 0 !important; background: #fff !important; overflow: visible !important; height: auto !important; padding: 0 !important; display: block !important; }
  .auto-print-overlay .no-print { display: none !important; }
  .auto-print-overlay .auto-sheet { box-shadow: none !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
  @page { size: A4 portrait; margin: 8mm; }
}
</style>
</helmet>

<!-- ============================================================
     SHELL — orquestra estado + routing. NÃO contém UI de ecrãs.
     Cada ecrã/painel é um DC filho próprio (ver ARQUITETURA.md).
     Cálculos/dados/formatação vivem em src/ (carregado em componentDidMount).
     ============================================================ -->
<div style="font-family:'IBM Plex Sans',system-ui,sans-serif;color:#16202e;min-height:100vh;display:flex;background:#eef1f5;">

  <!-- Aviso: uma gravação na nuvem falhou (não silencioso). -->
  <sc-if value="{{ saveErro }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;top:0;left:0;right:0;z-index:400;background:#b3261e;color:#fff;padding:11px 18px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.2);">
      <span>⚠ A última alteração <strong style="font-weight:600;">não ficou gravada na nuvem</strong>. Verifica a ligação à internet e as permissões do Firebase. Detalhe: <span style="font-family:'IBM Plex Mono',monospace;">{{ saveErro }}</span></span>
      <span onClick="{{ onDismissErro }}" style="cursor:pointer;text-decoration:underline;white-space:nowrap;">fechar</span>
    </div>
  </sc-if>

  <!-- Esqueleto enquanto os módulos src/ carregam -->
  <sc-if value="{{ notReady }}" hint-placeholder-val="{{ true }}">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;height:100vh;color:#8a94a6;font-size:13px;font-family:'IBM Plex Mono',monospace;">a carregar…</div>
  </sc-if>

  <!-- Sem sessão iniciada: ecrã de login a ecrã inteiro -->
  <sc-if value="{{ precisaLogin }}" hint-placeholder-val="{{ false }}">
    <div style="flex:1;min-width:0;">
      <dc-import name="Login" vm="{{ loginVM }}" hint-size="100%,100%"></dc-import>
    </div>
  </sc-if>

  <sc-if value="{{ ready }}" hint-placeholder-val="{{ false }}">
    <dc-import name="Sidebar" vm="{{ sidebarVM }}" style="width:248px;flex:none;" hint-size="248px,100%"></dc-import>

    <main style="flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;">
      <sc-if value="{{ isCarteira }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Carteira" vm="{{ carteiraVM }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isObra }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ObraDetalhe" vm="{{ detalheVM }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isFaturacao }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Faturacao" vm="{{ faturacaoVM }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isAprovacao }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Aprovacao" vm="{{ aprovacaoVM }}" hint-size="100%,100%"></dc-import>
      </sc-if>
    </main>

    <sc-if value="{{ autoModalOpen }}" hint-placeholder-val="{{ false }}">
      <dc-import name="ModalAuto" vm="{{ autoModal }}" hint-size="100%,100%"></dc-import>
    </sc-if>
    <sc-if value="{{ custoModalOpen }}" hint-placeholder-val="{{ false }}">
      <dc-import name="ModalCusto" vm="{{ custoM }}" hint-size="100%,100%"></dc-import>
    </sc-if>
    <sc-if value="{{ obraModalOpen }}" hint-placeholder-val="{{ false }}">
      <dc-import name="ModalObra" vm="{{ obraM }}" hint-size="100%,100%"></dc-import>
    </sc-if>
    <sc-if value="{{ codModalOpen }}" hint-placeholder-val="{{ false }}">
      <dc-import name="ModalCodigo" vm="{{ codM }}" hint-size="100%,100%"></dc-import>
    </sc-if>
    <sc-if value="{{ printAutoOpen }}" hint-placeholder-val="{{ false }}">
      <div class="auto-print-overlay" style="position:fixed;inset:0;z-index:300;background:rgba(16,32,62,.55);overflow:auto;">
        <dc-import name="AutoPDF" vm="{{ autoFolha }}" hint-size="794px,100%"></dc-import>
      </div>
    </sc-if>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;acentoCor&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Azul&quot;,&quot;options&quot;:[&quot;Azul&quot;,&quot;Verde&quot;,&quot;Ardósia&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;densidade&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Confortável&quot;,&quot;options&quot;:[&quot;Confortável&quot;,&quot;Compacta&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;realcarMargemBaixa&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
// ============================================================
// SHELL LOGIC — estado da aplicação + ações + carregamento de módulos.
// Camadas (ver ARQUITETURA.md):
//   src/data    -> dados das obras
//   src/core    -> format / theme / calc / storage
//   src/viewmodels -> constroem as props de cada ecrã/modal
// Este ficheiro NÃO calcula nem desenha: delega tudo.
// ============================================================
class Component extends DCLogic {
  state = {
    view: 'carteira', selectedId: null, sortKey: 'lucro', sortDir: 'desc',
    filtro: 'Todas', detailTab: 'rentabilidade',
    custoOverrides: {}, autosData: {}, custosData: {}, orcamentoData: {}, adjudPctData: {},
    autoModal: null, custoModal: null, autosSeedDel: {}, autosSeedData: {}, estadoData: {}, printAuto: null,
    autoFatData: {}, fatFiltro: 'todos', custoFamilia: 'Todas',
    autoAprovData: {}, obrasAcessoData: {}, codModal: null, aprovFiltro: 'pendentes',
    tncData: {}, tncForm: { data: '', descricao: '', valor: '' }, fechoData: {},
    obrasNovas: [], obrasDel: [], obraModal: null, dashAno: null, pieModo: 'geral', pieMes: null, obraPieModo: 'total', obraPieAuto: null,
    sessao: null, loginUser: '', loginPass: '', loginErro: '', authPronto: false,
    saveErro: null,
  };

  // Módulos (carregados de forma assíncrona em componentDidMount).
  M = null;

  // Ponte de eventos: os view-models recebem este objeto e ligam os onClick.
  on = {
    open:(c)=>this.open(c), back:()=>this.back(), goCarteira:()=>this.setState({view:'carteira'}), goFaturacao:()=>this.goFaturacao(),
    setFatFiltro:(f)=>this.setState({ fatFiltro:f }),
    proformarAuto:(c,k)=>this.pedirCodigo(c,k,'proforma'), faturarAuto:(c,k)=>this.pedirCodigo(c,k,'faturado'), anularAuto:(c,k)=>this.marcarFat(c,k,'pendente'),
    goAprovacao:()=>this.goAprovacao(), setAprovFiltro:(f)=>this.setState({ aprovFiltro:f }),
    enviarAprovacao:(c,k)=>this.enviarAprovacao(c,k), aprovarAuto:(c,k)=>this.aprovarAuto(c,k), reprovarAuto:(c,k)=>this.reprovarAuto(c,k),
    setObraAcesso:(c,u)=>this.setObraAcesso(c,u), obraAcesso:(u)=>this.obraAcesso(u),
    codField:(v)=>this.setState(s=>({ codModal:{ ...s.codModal, cod:v } })), codConfirm:()=>this.codConfirm(), codClose:()=>this.setState({ codModal:null }),
    sort:(k)=>this.sort(k), setFiltro:(f)=>this.setFiltro(f), setTab:(t)=>this.setTab(t),
    setCusto:(c,e)=>this.setCusto(c,e), custoImportar:(c,fl)=>this.custoImportarVarios(c,fl), vendaImportar:(c,fl)=>this.vendaImportarVarios(c,fl),
    orcField:(c,l,k,f,v)=>this.orcField(c,l,k,f,v), orcAdd:(c,l)=>this.orcAdd(c,l), orcAddTitulo:(c,l)=>this.orcAddTitulo(c,l), orcMover:(c,l,a,b)=>this.orcMover(c,l,a,b), orcDel:(c,l,k)=>this.orcDel(c,l,k), setAdjudPct:(c,v)=>this.setAdjudPct(c,v), setAdjudValor:(c,v)=>this.setAdjudValor(c,v), orcColar:(c,t)=>this.orcColar(c,t), orcColarEm:(c,l,k,col,t)=>this.orcColarEm(c,l,k,col,t), orcImportar:(c,f)=>this.orcImportar(c,f),
    novoAuto:(c)=>this.openNovoAuto(c), novoCusto:(c)=>this.openNovoCusto(c),
    deleteUserAuto:(c,i)=>this.deleteUserAuto(c,i), deleteSeedAuto:(c,i)=>this.deleteSeedAuto(c,i), deleteCusto:(c,id)=>this.deleteCusto(c,id),
    setEstado:(c,v)=>this.setEstado(c,v), setUserAutoData:(c,i,v)=>this.setUserAutoData(c,i,v), setSeedAutoData:(c,i,v)=>this.setSeedAutoData(c,i,v),
    abrirPDF:(c,i)=>this.abrirPDF(c,i), fecharPDF:()=>this.fecharPDF(), imprimirPDF:()=>this.imprimirPDF(),
    novaObra:()=>this.openNovaObra(), obraField:(f,v)=>this.setObraField(f,v), saveObra:()=>this.saveObra(), closeObra:()=>this.closeObraModal(), deleteObra:(c)=>this.deleteObra(c),
    setDashAno:(y)=>this.setState({ dashAno:y }),
    setPieModo:(m)=>this.setState({ pieModo:m, pieMes:null }),
    setPieMes:(i)=>this.setState({ pieMes:i }),
    tncField:(f,v)=>this.setState(s=>({ tncForm:{ ...s.tncForm, [f]:v } })), tncAdd:(c)=>this.tncAdd(c), tncDel:(c,id)=>this.tncDel(c,id),
    fecharObra:(c)=>this.fecharObra(c),
    setObraPieModo:(m)=>this.setState({ obraPieModo:m, obraPieAuto:null }),
    setObraPieAuto:(i)=>this.setState({ obraPieAuto:i }),
    // Autenticação
    loginUser:(v)=>this.setState({ loginUser:v, loginErro:'' }),
    loginPass:(v)=>this.setState({ loginPass:v, loginErro:'' }),
    entrar:()=>this.entrar(), sair:()=>this.sair(),
    dismissErro:()=>this.setState({ saveErro:null }),
    modalDate:(e)=>this.setModalDate(e), modalQtd:(id,e)=>this.setModalQtd(id,e),
    saveAuto:()=>this.saveAuto(), closeAuto:()=>this.closeAutoModal(),
    custoField:(f,v)=>this.setCustoField(f,v), saveCusto:()=>this.saveCusto(), closeCusto:()=>this.closeCustoModal(),
    setCustoFamilia:(f)=>this.setState({ custoFamilia:f }),
  };

  async componentDidMount(){
    try {
      this.M = await import('./src/index.js');
    } catch(err){
      console.error('[Gestão de Obras] falha ao carregar módulos src/index.js', err);
      this.forceUpdate();
      return;
    }
    // Falhas de gravação na nuvem deixam de ser silenciosas: mostra um banner
    // com o código do erro do Firebase (ex.: PERMISSION_DENIED).
    this.M.storage.onSaveError((k, e) => {
      this.setState({ saveErro: (e && (e.code || e.message)) || 'erro ao gravar' });
    });
    // Observa o login (Firebase). Com sessão, subscreve os dados partilhados
    // (1.º carregamento + atualização AO VIVO). Sem sessão, mostra o login.
    this.M.auth.observarSessao((sessao) => {
      if(sessao){
        if(!this._unsubDados){
          this._unsubDados = this.M.storage.subscribe((dados) => this.setState(dados));
        }
        this.setState({ sessao, authPronto:true });
      } else {
        if(this._unsubDados){ this._unsubDados(); this._unsubDados = null; }
        this.setState({ sessao:null, authPronto:true,
          custoOverrides:{}, autosData:{}, custosData:{}, orcamentoData:{}, adjudPctData:{},
          autosSeedDel:{}, autosSeedData:{}, estadoData:{}, autoFatData:{}, autoAprovData:{},
          obrasAcessoData:{}, tncData:{}, fechoData:{}, obrasNovas:[], obrasDel:[] });
      }
    });
  }

  // ---- Autenticação ----
  _podeEditar(){ return !!(this.M && this.M.auth.podeEditar(this.state.sessao)); }
  _podeApagarObra(){ return !!(this.M && this.M.auth.podeApagarObra(this.state.sessao)); }
  _podeApagarAuto(){ return !!(this.M && this.M.auth.podeApagarAuto(this.state.sessao)); }
  _podeFaturar(){ return !!(this.M && this.M.auth.podeFaturar(this.state.sessao)); }
  _podeAprovar(){ return !!(this.M && this.M.auth.podeAprovar(this.state.sessao)); }
  _veTudo(){ return !!(this.M && this.M.auth.veTudo(this.state.sessao)); }
  async entrar(){
    if(!this.M) return;
    const s = await this.M.auth.autenticar(this.state.loginUser, this.state.loginPass);
    if(!s){ this.setState({ loginErro:'Utilizador ou palavra-passe incorretos.' }); return; }
    // A sessão e os dados são carregados por observarSessao; aqui só limpamos o form.
    this.setState({ loginUser:'', loginPass:'', loginErro:'', view:'carteira', selectedId:null });
  }
  async sair(){
    if(this.M) await this.M.auth.sair();
    // observarSessao limpa a sessão e os dados.
    this.setState({ loginUser:'', loginPass:'', loginErro:'' });
  }

  // ---- Faturação de autos (admin + gestor) ----
  // Admin e gestor acedem ao separador de Faturação (só itens APROVADOS).
  goFaturacao(){ if(this._podeFaturar()) this.setState({ view:'faturacao', selectedId:null }); }
  // ---- Aprovação de autos (só admin) ----
  goAprovacao(){ if(this._podeAprovar()) this.setState({ view:'aprovacao', selectedId:null }); }
  // Pede o código da fatura antes de emitir proforma/fatura (obrigatório).
  // Só permite faturar itens já APROVADOS pelo admin.
  pedirCodigo(codigo, key, estado){
    if(!this._podeFaturar() || !codigo || !key || !this.M) return;
    const obra = this._obras().find(o => o.codigo === codigo); if(!obra) return;
    if(this.M.calc.aprovDe(obra, this.state, key) !== 'aprovado') return; // não aprovado: não fatura
    const cods = this.M.calc.fatCodigos(obra, this.state, key);
    let itemLabel = 'Adjudicação', valor = 0;
    if(key === this.M.calc.ADJ_KEY){ valor = this.M.calc.adjudDe(obra, this.state); }
    else { const it = this.M.calc.autosFaturaveis(obra, this.state).find(a => a.key === key); if(it){ itemLabel = 'Auto ' + it.n; valor = it.total; } }
    const prefill = estado === 'faturado' ? (cods.codFatura || cods.codProforma || '') : (cods.codProforma || '');
    this.setState({ codModal:{ codigo, key, estado, titulo:obra.titulo, obraCodigo:obra.codigo, itemLabel, valorFmt:this.M.fmt.EUR(valor), cod:prefill } });
  }
  codConfirm(){
    const cm = this.state.codModal; if(!cm) return;
    const cod = String(cm.cod || '').trim(); if(!cod) return;
    this.marcarFat(cm.codigo, cm.key, cm.estado, cod);
    this.setState({ codModal:null });
  }
  // Marca o estado de faturação de um auto: 'proforma' | 'faturado' | 'pendente'.
  // Guarda datas e o código da fatura (proforma/fatura). pendente = ausente.
  marcarFat(codigo, key, estado, cod){
    if(!this._podeFaturar() || !codigo || !key) return;
    const obraFat = Object.assign({}, this.state.autoFatData[codigo] || {});
    if(estado === 'proforma' || estado === 'faturado'){
      const prev = obraFat[key];
      const p = (prev && typeof prev === 'object') ? prev : {};
      const hoje = new Date().toISOString().slice(0, 10);
      const next = { estado, dataProforma:p.dataProforma || null, dataFatura:p.dataFatura || null, codProforma:p.codProforma || '', codFatura:p.codFatura || '' };
      if(estado === 'proforma'){ if(!next.dataProforma) next.dataProforma = hoje; if(cod != null) next.codProforma = String(cod).trim(); }
      if(estado === 'faturado'){ next.dataFatura = hoje; if(cod != null) next.codFatura = String(cod).trim(); }
      obraFat[key] = next;
    } else {
      delete obraFat[key];
    }
    const data = Object.assign({}, this.state.autoFatData, { [codigo]:obraFat });
    this.setState({ autoFatData:data });
    if(this.M) this.M.storage.saveAutoFat(data);
  }

  // ---- Fluxo de aprovação (rascunho → pendente → aprovado | reprovado) ----
  // O criador do auto (utilizador ou gestor) envia para aprovação do admin.
  enviarAprovacao(codigo, key){
    if(!this._podeEditar() || !codigo || !key || !this.M) return;
    const ap = Object.assign({}, this.state.autoAprovData[codigo] || {});
    const hoje = new Date().toISOString().slice(0, 10);
    ap[key] = { estado:'pendente', dataEnvio:hoje, dataDecisao:null, motivo:'', por:this.state.sessao ? this.state.sessao.user : '' };
    const data = Object.assign({}, this.state.autoAprovData, { [codigo]:ap });
    this.setState({ autoAprovData:data });
    this.M.storage.saveAprov(data);
  }
  _decidirAprov(codigo, key, estado, motivo){
    if(!this._podeAprovar() || !codigo || !key || !this.M) return;
    const ap = Object.assign({}, this.state.autoAprovData[codigo] || {});
    const prev = (ap[key] && typeof ap[key] === 'object') ? ap[key] : {};
    const hoje = new Date().toISOString().slice(0, 10);
    ap[key] = { estado, dataEnvio:prev.dataEnvio || null, dataDecisao:hoje, motivo:motivo || '', por:this.state.sessao ? this.state.sessao.user : '' };
    const data = Object.assign({}, this.state.autoAprovData, { [codigo]:ap });
    this.setState({ autoAprovData:data });
    this.M.storage.saveAprov(data);
  }
  aprovarAuto(codigo, key){ this._decidirAprov(codigo, key, 'aprovado', ''); }
  reprovarAuto(codigo, key){
    let motivo = '';
    if(typeof window !== 'undefined'){ motivo = window.prompt('Motivo da reprovação (opcional):', '') || ''; }
    this._decidirAprov(codigo, key, 'reprovado', motivo);
  }

  // ---- Acessos por obra (que utilizadores a veem) ----
  setObraAcesso(codigo, user){
    if(!this._podeEditar() || !codigo || !user || !this.M) return;
    const cur = ((this.state.obrasAcessoData && this.state.obrasAcessoData[codigo]) || []).slice();
    const i = cur.indexOf(user);
    if(i >= 0) cur.splice(i, 1); else cur.push(user);
    const data = Object.assign({}, this.state.obrasAcessoData, { [codigo]:cur });
    this.setState({ obrasAcessoData:data });
    this.M.storage.saveAcesso(data);
  }
  obraAcesso(user){
    this.setState(s => { const cur = ((s.obraModal && s.obraModal.acessos) || []).slice(); const i = cur.indexOf(user); if(i >= 0) cur.splice(i, 1); else cur.push(user); return { obraModal:{ ...s.obraModal, acessos:cur } }; });
  }
  _acessosDe(codigo){ return (this.state.obrasAcessoData && this.state.obrasAcessoData[codigo]) || []; }
  // Lista COMPLETA de obras = semente + criadas − apagadas, com acessos e estado.
  _todasObras(){
    if(!this.M) return [];
    const del = this.state.obrasDel || [];
    const est = this.state.estadoData || {};
    const novas = (this.state.obrasNovas || []).map(m => this.M.buildObraUtilizador(m));
    return [...this.M.OBRAS, ...novas]
      .filter(o => !del.includes(o.codigo))
      .map(o => Object.assign({}, o, { estado: est[o.codigo] || o.estado, acessos: this._acessosDe(o.codigo) }));
  }
  // Lista EFETIVA (visível ao utilizador atual): admin/gestor veem tudo;
  // utilizador só vê as obras a que tem acesso.
  _obras(){
    const all = this._todasObras();
    if(this.M && this.M.auth.veTudo(this.state.sessao)) return all;
    return all.filter(o => this.M.auth.podeVerObra(this.state.sessao, o.acessos));
  }
  _modalOpen = false;
  componentDidUpdate(){
    // Bloqueia o scroll do body enquanto um modal está aberto.
    const is = !!(this.state.autoModal || this.state.custoModal || this.state.printAuto || this.state.obraModal || this.state.codModal);
    if(is !== this._modalOpen){ this._modalOpen = is; document.body.style.overflow = is ? 'hidden' : ''; }
  }
  componentWillUnmount(){ document.body.style.overflow = ''; }

  // ---- Navegação / tabela ----
  open(c){ this.setState({ view:'obra', selectedId:c, detailTab:'rentabilidade' }); }
  back(){ this.setState({ view:'carteira' }); }
  sort(k){ this.setState(s => { if(s.sortKey === k) return { sortDir: s.sortDir === 'asc' ? 'desc' : 'asc' }; return { sortKey:k, sortDir:['valorObra','custo','lucro','margem','pctFat'].includes(k) ? 'desc' : 'asc' }; }); }
  setFiltro(f){ this.setState({ filtro:f }); }
  setTab(t){ this.setState({ detailTab:t }); }

  // ---- Estado da obra (alterado no detalhe; vale para semente e novas) ----
  setEstado(codigo, value){
    if(!this._podeEditar()) return;
    const data = { ...this.state.estadoData, [codigo]:value };
    this.setState({ estadoData:data });
    if(this.M) this.M.storage.saveEstado(data);
  }

  // ---- Data de um auto (editável na tabela de autos) ----
  setUserAutoData(codigo, idx, value){
    if(!this._podeEditar() || !value) return;
    const lista = (this.state.autosData[codigo] || []).map((a, i) => i === idx ? { ...a, data:value } : a);
    const newData = { ...this.state.autosData, [codigo]:lista };
    this.setState({ autosData:newData });
    if(this.M) this.M.storage.saveAutos(newData);
  }
  setSeedAutoData(codigo, origIdx, value){
    if(!this._podeEditar() || !value) return;
    const cur = this.state.autosSeedData[codigo] || {};
    const newCur = { ...cur, [origIdx]:{ ...(cur[origIdx] || {}), data:value } };
    const newData = { ...this.state.autosSeedData, [codigo]:newCur };
    this.setState({ autosSeedData:newData });
    if(this.M) this.M.storage.saveAutosSeedData(newData);
  }

  // ---- Custo manual simples (separador Rentabilidade) ----
  setCusto(codigo, e){
    if(!this._podeEditar()) return;
    let v = parseFloat(String(e.target.value).replace(/\s/g,'').replace(',','.')); if(isNaN(v)) v = 0;
    const o = { ...this.state.custoOverrides, [codigo]:v };
    this.setState({ custoOverrides:o });
    if(this.M) this.M.storage.saveOverrides(o);
  }

  // ---- Auto base (mapa de trabalhos editável) ----
  // Cópia editável do orçamento efetivo da obra (semente ou já editado).
  _orcBase(codigo){
    const cur = this.state.orcamentoData[codigo];
    if(cur && cur.artigos) return { artigos:cur.artigos.map(x => ({ ...x })), extra:(cur.extra||[]).map(x => ({ ...x })) };
    const obra = this.M.OBRAS.find(o => o.codigo === codigo) || this._obras().find(o => o.codigo === codigo);
    return { artigos:obra.orcamento.artigos.map(x => ({ ...x })), extra:obra.orcamento.extra.map(x => ({ ...x })) };
  }
  _saveOrc(codigo, orc){
    const data = { ...this.state.orcamentoData, [codigo]:orc };
    this.setState({ orcamentoData:data });
    if(this.M) this.M.storage.saveOrcamento(data);
  }
  orcField(codigo, lista, _k, field, value){
    if(!this._podeEditar()) return;
    const orc = this._orcBase(codigo);
    const it = orc[lista].find(x => x._k === _k); if(!it) return;
    if(field === 'qt' || field === 'vunit'){ let v = parseFloat(String(value).replace(',', '.')); if(isNaN(v)) v = 0; it[field] = v; }
    else it[field] = value;
    this._saveOrc(codigo, orc);
  }
  orcAdd(codigo, lista){
    if(!this._podeEditar()) return;
    const orc = this._orcBase(codigo);
    const _k = 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    orc[lista].push({ _k, id:'', desc:'', uni:'vg', qt:0, vunit:0 });
    this._saveOrc(codigo, orc);
  }
  // Título de divisão (ex.: "1 — Preparações"). Linha organizadora: não entra em cálculos nem no auto.
  orcAddTitulo(codigo, lista){
    if(!this._podeEditar()) return;
    const orc = this._orcBase(codigo);
    const _k = 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    orc[lista].push({ _k, _sec:true, titulo:'' });
    this._saveOrc(codigo, orc);
  }
  // Reordenar (arrastar-largar): move a linha 'fromK' para a posição da linha 'toK'.
  orcMover(codigo, lista, fromK, toK){
    if(!this._podeEditar() || fromK === toK) return;
    const orc = this._orcBase(codigo);
    const arr = orc[lista];
    const from = arr.findIndex(x => x._k === fromK);
    let to = arr.findIndex(x => x._k === toK);
    if(from < 0 || to < 0) return;
    const [moved] = arr.splice(from, 1);
    to = arr.findIndex(x => x._k === toK); // reindexa após remover
    arr.splice(to, 0, moved);
    this._saveOrc(codigo, orc);
  }
  orcDel(codigo, lista, _k){
    if(!this._podeEditar()) return;
    const orc = this._orcBase(codigo);
    orc[lista] = orc[lista].filter(x => x._k !== _k);
    this._saveOrc(codigo, orc);
  }
  setAdjudPct(codigo, value){
    if(!this._podeEditar()) return;
    if(this._adjudBloqueada(codigo)) return; // adjudicação faturada: bloqueada
    let v = parseFloat(String(value).replace(',', '.')); if(isNaN(v)) v = 0;
    const data = { ...this.state.adjudPctData, [codigo]: v / 100 };
    this.setState({ adjudPctData:data });
    if(this.M) this.M.storage.saveAdjudPct(data);
  }
  // Verdade se a adjudicação desta obra já foi faturada (fica bloqueada).
  _adjudBloqueada(codigo){
    if(!this.M) return false;
    const obra = this._obras().find(o => o.codigo === codigo);
    return !!(obra && this.M.calc.adjudBloqueada(obra, this.state));
  }
  // Editar a ADJUDICAÇÃO em valor (€): converte para % sobre o orçamento dos
  // artigos e grava a %. Assim o valor e a % ficam sempre sincronizados.
  setAdjudValor(codigo, value){
    if(!this._podeEditar() || !this.M) return;
    if(this._adjudBloqueada(codigo)) return; // adjudicação faturada: bloqueada
    let v = parseFloat(String(value).replace(/[\u20ac\s]/g,'').replace(/\.(?=\d{3}(\D|$))/g,'').replace(',', '.')); if(isNaN(v)) v = 0;
    const obra = this.M.OBRAS.find(o => o.codigo === codigo) || this._obras().find(o => o.codigo === codigo);
    const orcT = obra ? this.M.calc.orcTotais(this.M.calc.orcamentoDe(obra, this.state)).orcT : 0;
    const pct = orcT ? v / orcT : 0;
    const data = { ...this.state.adjudPctData, [codigo]: pct };
    this.setState({ adjudPctData:data });
    this.M.storage.saveAdjudPct(data);
  }
  // Colar do Excel: acrescenta as linhas coladas aos artigos.
  orcColar(codigo, texto){
    if(!this._podeEditar() || !this.M || !texto) return;
    const novos = this.M.xlsx.parseColadosOrc(texto);
    if(!novos.length) return;
    const orc = this._orcBase(codigo);
    novos.forEach(it => { const _k = 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); orc.artigos.push({ _k, ...it }); });
    this._saveOrc(codigo, orc);
  }
  // Colar um bloco do Excel A PARTIR de uma célula (estilo folha de cálculo):
  // preenche para a direita/baixo a partir da linha/coluna onde se colou,
  // criando linhas novas quando necessário. As colunas seguem a ordem visível.
  orcColarEm(codigo, lista, startK, startCol, texto){
    if(!this._podeEditar() || !this.M || !texto) return;
    const grid = String(texto).replace(/\r/g, '').replace(/\n+$/,'').split('\n').map(r => r.split('\t'));
    const fields = ['id', 'desc', 'uni', 'qt', 'vunit'];
    const toNum = s => { let v = String(s).replace(/[\u20ac\s]/g, '').replace(/\.(?=\d{3}(\D|$))/g, '').replace(',', '.').replace(/[^\d.-]/g, ''); const n = parseFloat(v); return isNaN(n) ? 0 : n; };
    const blank = () => ({ _k:'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), id:'', desc:'', uni:'vg', qt:0, vunit:0 });
    const orc = this._orcBase(codigo);
    const arr = orc[lista];
    let w = arr.findIndex(x => x._k === startK); if(w < 0) w = arr.length;
    grid.forEach(cells => {
      const looksHeader = cells.length > 1 && cells.every(c => !/\d/.test(c)) && /descri|item|unidade|quant|valor|v\.?\s*unit|^\s*un\s*$/i.test(cells.join(' '));
      if(looksHeader) return;
      if(cells.every(c => !String(c).trim())) return;
      while(arr.length <= w) arr.push(blank());
      cells.forEach((val, ci) => {
        const f = fields[startCol + ci]; if(!f) return;
        const v = String(val).trim();
        arr[w][f] = (f === 'qt' || f === 'vunit') ? toNum(v) : v;
      });
      w++;
    });
    this._saveOrc(codigo, orc);
  }

  // Importar um ficheiro Excel/CSV arrastado: substitui os artigos pelo conteúdo do ficheiro.
  async orcImportar(codigo, file){
    if(!this._podeEditar() || !this.M || !file) return;
    const nome = (file.name || 'ficheiro').toLowerCase();
    try{
      let itens = [];
      if(/\.(csv|tsv|txt)$/.test(nome) || (file.type || '').startsWith('text')){
        itens = this.M.xlsx.parseColadosOrc(await file.text());
      } else {
        const parsed = await this.M.xlsx.parseXlsx(await file.arrayBuffer());
        itens = this.M.xlsx.parseXlsxOrc(parsed);
      }
      if(!itens.length){
        this.setState({ orcImport:{ codigo, erro:true, msg:'Não consegui ler linhas de "' + file.name + '". Confirma que tem colunas de descrição, quantidade e valor unitário.' } });
        return;
      }
      const orc = this._orcBase(codigo);
      orc.artigos = itens.map(it => ({ _k:'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), ...it }));
      this._saveOrc(codigo, orc);
      this.setState({ orcImport:{ codigo, erro:false, msg:itens.length + ' artigos importados de "' + file.name + '". Revê e corrige abaixo se for preciso.' } });
    }catch(err){
      this.setState({ orcImport:{ codigo, erro:true, msg:'Não foi possível ler o ficheiro. Usa um .xlsx (exportado do Excel) ou um .csv.' } });
    }
  }

  // Importar custos de um ou vários Excel (materiais / equipamentos / recursos
  // humanos): cada linha válida vira um lançamento. Processa os ficheiros em
  // conjunto para não perder lançamentos (uma só gravação no fim).
  async custoImportarVarios(codigo, files){
    if(!this._podeEditar() || !this.M || !files || !files.length) return;
    let todos = []; const nomes = [];
    for(const file of files){
      try{
        const parsed = await this.M.xlsx.parseXlsx(await file.arrayBuffer());
        const l = this.M.xlsx.parseXlsxCustos(parsed);
        if(l.length){ todos = todos.concat(l); nomes.push(file.name); }
      }catch(e){ /* ignora ficheiro ilegível */ }
    }
    if(!todos.length){
      this.setState({ custoImport:{ codigo, erro:true, msg:'Não consegui ler lançamentos. Usa os .xlsx exportados do Excel (com colunas de data, descrição e valor).' } });
      return;
    }
    const base = Date.now();
    const novos = todos.map((e, i) => ({
      id: base + i, data: e.data || new Date().toISOString().slice(0,10),
      categoria: e.categoria, familia: e.familia || e.categoria, codigo: e.codigo || '',
      descricao: e.descricao, fornecedor: e.fornecedor, valor: e.valor,
    }));
    const existing = this.state.custosData[codigo] || [];
    const newData = { ...this.state.custosData, [codigo]:[...existing, ...novos] };
    const total = novos.reduce((s,e) => s + e.valor, 0);
    this.setState({ custosData:newData, custoImport:{ codigo, erro:false, msg:novos.length + ' lançamentos importados (' + this.M.fmt.EUR(total) + ') de ' + nomes.length + ' ficheiro(s).' } });
    this.M.storage.saveCustos(newData);
  }

  // Importar VENDAS (faturação Ofigeste) de um ou vários Excel: mesmo parser dos
  // custos, mas cada linha entra como categoria 'Venda' (faturado, não custo).
  async vendaImportarVarios(codigo, files){
    if(!this._podeEditar() || !this.M || !files || !files.length) return;
    let todos = []; const nomes = [];
    for(const file of files){
      try{
        const parsed = await this.M.xlsx.parseXlsx(await file.arrayBuffer());
        const l = this.M.xlsx.parseXlsxCustos(parsed);
        if(l.length){ todos = todos.concat(l); nomes.push(file.name); }
      }catch(e){ /* ignora ficheiro ilegível */ }
    }
    if(!todos.length){
      this.setState({ vendaImport:{ codigo, erro:true, msg:'Não consegui ler vendas. Usa o .xlsx da faturação (com colunas de data, descrição e valor).' } });
      return;
    }
    const VENDA = this.M.calc.VENDA_CAT;
    const base = Date.now();
    const novos = todos.map((e, i) => ({
      id: base + i, data: e.data || new Date().toISOString().slice(0,10),
      categoria: VENDA, familia: VENDA, codigo: e.codigo || '',
      descricao: e.descricao, fornecedor: e.fornecedor, valor: e.valor,
    }));
    const existing = this.state.custosData[codigo] || [];
    const newData = { ...this.state.custosData, [codigo]:[...existing, ...novos] };
    const total = novos.reduce((s,e) => s + e.valor, 0);
    this.setState({ custosData:newData, vendaImport:{ codigo, erro:false, msg:novos.length + ' vendas importadas (' + this.M.fmt.EUR(total) + ') de ' + nomes.length + ' ficheiro(s).' } });
    this.M.storage.saveCustos(newData);
  }

  // ---- Autos de medição ----
  // Itens do mapa de trabalhos EFETIVO (com edições ao auto base) — artigos + extra.
  // Assim o "Novo auto" reflete sempre o auto base atualizado.
  _itensObra(obraId){
    const obra = this._obras().find(o => o.codigo === obraId);
    return obra ? this.M.calc.orcItensDe(obra, this.state) : [];
  }
  // Quantidade já medida por artigo (soma de TODOS os autos), indexada por _k.
  // Inclui trabalhos a mais (qtdsExtra) para que o acumulado seja completo.
  _medidoPorArtigo(obraId){
    const acc = {};
    const obra = this._obras().find(o => o.codigo === obraId);
    const autos = obra ? this.M.calc.autosDe(obra, this.state) : (this.state.autosData[obraId] || []);
    autos.forEach(a => {
      Object.entries(a.qtds || {}).forEach(([k,q]) => { acc[k] = (acc[k] || 0) + (parseFloat(q) || 0); });
      Object.entries(a.qtdsExtra || {}).forEach(([k,q]) => { acc[k] = (acc[k] || 0) + (parseFloat(q) || 0); });
    });
    return acc;
  }
  // Quanto falta medir de um artigo (contratado − já medido). null = sem contrato definido (sem limite).
  _restaArtigo(it, medido){
    if(!(it.qt > 0)) return null;
    return Math.max(0, Math.round((it.qt - (medido[it._k] || 0)) * 1000) / 1000);
  }
  _proximoMesISO(iso){
    const d = new Date((iso || new Date().toISOString().slice(0,10)) + 'T00:00:00');
    d.setMonth(d.getMonth() + 1);
    return d.toISOString().slice(0,10);
  }
  openNovoAuto(obraId, date){
    if(!this._podeEditar()) return;
    const items = this._itensObra(obraId);
    const qtds = {}; items.forEach(it => { qtds[it._k] = 0; });
    this.setState({ autoModal:{ obraId, date: date || new Date().toISOString().slice(0,10), qtds } });
  }
  closeAutoModal(){ this.setState({ autoModal:null }); }
  setModalDate(e){ const v = e.target.value; this.setState(s => ({ autoModal:{ ...s.autoModal, date:v } })); }
  setModalQtd(k, e){
    let v = parseFloat(String(e.target.value).replace(',','.')) || 0;
    const am = this.state.autoModal; if(!am) return;
    // Limita ao que falta medir: não se pode voltar a medir o que já foi medido.
    if(this.M){
      const it = this._itensObra(am.obraId).find(x => x._k === k);
      if(it){ const resta = this._restaArtigo(it, this._medidoPorArtigo(am.obraId)); if(resta != null && v > resta) v = resta; }
    }
    this.setState(s => ({ autoModal:{ ...s.autoModal, qtds:{ ...s.autoModal.qtds, [k]:v } } }));
  }
  saveAuto(){
    if(!this._podeEditar()) return;
    const { autoModal, autosData } = this.state; if(!autoModal || !this.M) return;
    const { obraId, date, qtds } = autoModal;
    const items = this._itensObra(obraId);
    const medido = this._medidoPorArtigo(obraId);
    // Garante que nenhuma linha excede o que falta (limita também ao guardar).
    // Separa artigos (com adjudicação) de trabalhos a mais (qtdsExtra, sem dedução).
    const qtdsLimpo = {}, qtdsExtraLimpo = {};
    let valor = 0;
    items.forEach(it => {
      let q = parseFloat(qtds[it._k]) || 0;
      const resta = this._restaArtigo(it, medido); if(resta != null && q > resta) q = resta;
      if(q > 0){
        const qr = Math.round(q * 1000) / 1000;
        if(it._lista === 'extra') qtdsExtraLimpo[it._k] = qr; else qtdsLimpo[it._k] = qr;
        valor += qr * it.vunit;
      }
    });
    const ehFecho = !!autoModal.fecho;
    if(valor <= 0 && !ehFecho) return; // auto de fecho pode ser só o acerto (sem medição)
    const obra = this._obras().find(o => o.codigo === obraId);
    const seedCount = obra ? obra.seedAutos.length : 0;
    const existing = autosData[obraId] || [];
    const n = seedCount + existing.length + 1;
    const entry = { id: Date.now(), n, data:date, qtds:qtdsLimpo, qtdsExtra:qtdsExtraLimpo, valor: Math.round(valor * 100) / 100 };
    if(ehFecho) entry.fecho = true;
    const updated = [...existing, entry];
    const newData = { ...autosData, [obraId]:updated };
    if(ehFecho){
      // Pré-visualiza o acerto de adjudicação e pede confirmação antes de concluir.
      const newFecho = { ...this.state.fechoData, [obraId]:{ data:date, autoId:entry.id } };
      const c = this.M.calc.calc(obra, { ...this.state, autosData:newData, fechoData:newFecho });
      const msg = 'Guardar o auto de fecho e concluir a obra ' + obraId + '?\n\n' +
        'Valor do auto de fecho: ' + this.M.fmt.EUR(entry.valor) + '\n' +
        'Trabalho a menos (não executado): ' + this.M.fmt.EUR(c.naoExec) + '\n' +
        'Acerto de adjudicação a devolver: ' + this.M.fmt.EUR(c.acertoAdjud) + '\n' +
        'Total final a receber: ' + this.M.fmt.EUR(c.faturado) + '\n\n' +
        'A obra fica marcada como Concluída.';
      if(!window.confirm(msg)) return;
      this.M.storage.saveAutos(newData);
      this.M.storage.saveFecho(newFecho);
      this.setState({ autosData:newData, fechoData:newFecho, autoModal:null });
      this.setEstado(obraId, 'Concluída');
      return;
    }
    this.M.storage.saveAutos(newData);
    // Sobra trabalho por medir? Abre logo o auto seguinte (mês seguinte). Senão, fecha.
    const medidoDepois = {};
    updated.forEach(a => {
      Object.entries(a.qtds || {}).forEach(([k,q]) => { medidoDepois[k] = (medidoDepois[k] || 0) + (parseFloat(q) || 0); });
      Object.entries(a.qtdsExtra || {}).forEach(([k,q]) => { medidoDepois[k] = (medidoDepois[k] || 0) + (parseFloat(q) || 0); });
    });
    const faltaAlgo = items.some(it => it.qt > 0 && (it.qt - (medidoDepois[it._k] || 0)) > 0.001);
    if(faltaAlgo){
      const q0 = {}; items.forEach(it => { q0[it._k] = 0; });
      this.setState({ autosData:newData, autoModal:{ obraId, date:this._proximoMesISO(date), qtds:q0 } });
    } else {
      this.setState({ autosData:newData, autoModal:null });
    }
  }
  deleteUserAuto(obraId, idx){
    if(!this._podeApagarAuto()) return;
    const lista = this.state.autosData[obraId] || [];
    const alvo = lista[idx];
    const updated = lista.filter((_, i) => i !== idx);
    const newData = { ...this.state.autosData, [obraId]:updated };
    this.setState({ autosData:newData });
    if(this.M) this.M.storage.saveAutos(newData);
    // Apagar o auto de fecho reabre a obra (remove o acerto e volta a Em execução).
    const f = this.state.fechoData[obraId];
    if(alvo && (alvo.fecho || (f && f.autoId === alvo.id))){
      const nf = { ...this.state.fechoData }; delete nf[obraId];
      this.setState({ fechoData:nf });
      if(this.M) this.M.storage.saveFecho(nf);
      this.setEstado(obraId, 'Em execução');
    }
  }
  // Eliminar um auto semente (marca o índice original como removido, persistente).
  deleteSeedAuto(obraId, origIdx){
    if(!this._podeApagarAuto()) return;
    const atual = this.state.autosSeedDel[obraId] || [];
    if(atual.includes(origIdx)) return;
    const newData = { ...this.state.autosSeedDel, [obraId]:[...atual, origIdx] };
    this.setState({ autosSeedDel:newData });
    if(this.M) this.M.storage.saveAutosSeedDel(newData);
  }

  // ---- PDF de um auto (folha imprimível) ----
  abrirPDF(obraId, idx){ this.setState({ printAuto:{ obraId, idx } }); }
  fecharPDF(){ this.setState({ printAuto:null }); }
  imprimirPDF(){ if(typeof window !== 'undefined') window.print(); }

  // ---- Criar / apagar obras ----
  openNovaObra(){
    if(!this._podeEditar()) return;
    const codigos = this._todasObras().map(o => o.codigo);
    const eu = this.state.sessao ? this.state.sessao.user : null;
    this.setState({ obraModal:{ codigo:this.M.proximoCodigo(codigos), titulo:'', cliente:'', inicio:new Date().toISOString().slice(0,10), estado:'Em execução', acessos: eu ? [eu] : [] } });
  }
  closeObraModal(){ this.setState({ obraModal:null }); }
  setObraField(field, value){ this.setState(s => ({ obraModal:{ ...s.obraModal, [field]:value } })); }
  saveObra(){
    if(!this._podeEditar()) return;
    const om = this.state.obraModal; if(!om || !this.M) return;
    const codigo = String(om.codigo || '').trim();
    const titulo = String(om.titulo || '').trim();
    if(!codigo || !titulo) return;
    if(this._todasObras().some(o => o.codigo.toLowerCase() === codigo.toLowerCase())) return; // código duplicado
    const meta = { codigo, titulo, cliente:String(om.cliente || '').trim(), inicio:om.inicio, estado:om.estado || 'Em execução' };
    const novas = [...(this.state.obrasNovas || []), meta];
    // Acessos: o criador fica sempre vinculado + os que escolheu no modal.
    const eu = this.state.sessao ? this.state.sessao.user : null;
    const escolhidos = Array.isArray(om.acessos) ? om.acessos.slice() : [];
    if(eu && !escolhidos.includes(eu)) escolhidos.push(eu);
    const acData = Object.assign({}, this.state.obrasAcessoData, { [codigo]:escolhidos });
    this.setState({ obrasNovas:novas, obrasAcessoData:acData, obraModal:null, view:'obra', selectedId:codigo, detailTab:'orcamento' });
    this.M.storage.saveObrasNovas(novas);
    this.M.storage.saveAcesso(acData);
  }
  deleteObra(codigo){
    if(!this._podeApagarObra()) return;
    if(typeof window !== 'undefined' && !window.confirm('Apagar esta obra e todos os seus dados (autos, custos, mapa de trabalhos)? Esta ação não pode ser desfeita.')) return;
    const isUser = (this.state.obrasNovas || []).some(m => m.codigo === codigo);
    const patch = {};
    if(isUser){
      const novas = (this.state.obrasNovas || []).filter(m => m.codigo !== codigo);
      patch.obrasNovas = novas; this.M.storage.saveObrasNovas(novas);
    } else {
      const del = [...(this.state.obrasDel || [])]; if(!del.includes(codigo)) del.push(codigo);
      patch.obrasDel = del; this.M.storage.saveObrasDel(del);
    }
    // Limpa dados associados (sem tocar noutras obras).
    const drop = (obj, save) => { if(obj && obj[codigo] !== undefined){ const n = { ...obj }; delete n[codigo]; patch[save.key] = n; save.fn(n); } };
    drop(this.state.autosData,      { key:'autosData',      fn:o => this.M.storage.saveAutos(o) });
    drop(this.state.custosData,     { key:'custosData',     fn:o => this.M.storage.saveCustos(o) });
    drop(this.state.tncData,        { key:'tncData',        fn:o => this.M.storage.saveTNC(o) });
    drop(this.state.fechoData,      { key:'fechoData',      fn:o => this.M.storage.saveFecho(o) });
    drop(this.state.orcamentoData,  { key:'orcamentoData',  fn:o => this.M.storage.saveOrcamento(o) });
    drop(this.state.adjudPctData,   { key:'adjudPctData',   fn:o => this.M.storage.saveAdjudPct(o) });
    drop(this.state.custoOverrides, { key:'custoOverrides', fn:o => this.M.storage.saveOverrides(o) });
    drop(this.state.autosSeedDel,   { key:'autosSeedDel',   fn:o => this.M.storage.saveAutosSeedDel(o) });
    drop(this.state.autosSeedData,  { key:'autosSeedData',  fn:o => this.M.storage.saveAutosSeedData(o) });
    drop(this.state.estadoData,     { key:'estadoData',     fn:o => this.M.storage.saveEstado(o) });
    drop(this.state.autoFatData,    { key:'autoFatData',    fn:o => this.M.storage.saveAutoFat(o) });
    drop(this.state.autoAprovData,  { key:'autoAprovData',  fn:o => this.M.storage.saveAprov(o) });
    drop(this.state.obrasAcessoData,{ key:'obrasAcessoData',fn:o => this.M.storage.saveAcesso(o) });
    if(this.state.selectedId === codigo){ patch.view = 'carteira'; patch.selectedId = null; }
    this.setState(patch);
  }

  // ---- Custos de obra (lançamentos) ----
  openNovoCusto(obraId){ if(!this._podeEditar()) return; this.setState({ custoModal:{ obraId, data:new Date().toISOString().slice(0,10), categoria:'Materiais', descricao:'', fornecedor:'', valor:'' } }); }
  closeCustoModal(){ this.setState({ custoModal:null }); }
  setCustoField(field, value){ this.setState(s => ({ custoModal:{ ...s.custoModal, [field]:value } })); }
  saveCusto(){
    if(!this._podeEditar()) return;
    const { custoModal, custosData } = this.state; if(!custoModal || !this.M) return;
    const valor = parseFloat(String(custoModal.valor).replace(',','.')); if(isNaN(valor) || valor <= 0) return;
    const entry = { id:Date.now(), data:custoModal.data, categoria:custoModal.categoria, descricao:custoModal.descricao, fornecedor:custoModal.fornecedor, valor };
    const updated = [...(custosData[custoModal.obraId] || []), entry];
    const newData = { ...custosData, [custoModal.obraId]:updated };
    this.setState({ custosData:newData, custoModal:null });
    this.M.storage.saveCustos(newData);
  }
  // ---- Trabalho não contabilizado (produção/lucro, nunca faturação) ----
  tncAdd(codigo){
    if(!this._podeEditar() || !this.M) return;
    const f = this.state.tncForm || {};
    const valor = parseFloat(String(f.valor).replace(',','.'));
    if(isNaN(valor) || valor <= 0) return;
    const data = f.data || new Date().toISOString().slice(0,10);
    const entry = { id:Date.now(), data, descricao:(f.descricao || '').trim(), valor };
    const updated = [...(this.state.tncData[codigo] || []), entry];
    const newData = { ...this.state.tncData, [codigo]:updated };
    this.setState({ tncData:newData, tncForm:{ data:'', descricao:'', valor:'' } });
    this.M.storage.saveTNC(newData);
  }
  tncDel(codigo, id){
    if(!this._podeEditar() || !this.M) return;
    const updated = (this.state.tncData[codigo] || []).filter(e => e.id !== id);
    const newData = { ...this.state.tncData, [codigo]:updated };
    this.setState({ tncData:newData });
    this.M.storage.saveTNC(newData);
  }
  // ---- Auto de fecho: abre o modal de auto normal em modo "fecho". Ao guardar,
  // cria um auto normal (enviável, imprimível, eliminável) + acerto de adjudicação
  // sobre o trabalho não executado, e conclui a obra. ----
  fecharObra(codigo){
    if(!this._podeEditar() || !this.M) return;
    if(this.state.fechoData[codigo]) return;
    const items = this._itensObra(codigo);
    const qtds = {}; items.forEach(it => { qtds[it._k] = 0; });
    this.setState({ autoModal:{ obraId:codigo, date:new Date().toISOString().slice(0,10), qtds, fecho:true } });
  }
  deleteCusto(obraId, entryId){
    if(!this._podeEditar()) return;
    const updated = (this.state.custosData[obraId] || []).filter(e => e.id !== entryId);
    const newData = { ...this.state.custosData, [obraId]:updated };
    this.setState({ custosData:newData });
    if(this.M) this.M.storage.saveCustos(newData);
  }

  renderVals(){
    const M = this.M;
    if(!M || !this.state.authPronto){
      // Módulos/login ainda a carregar — mostra esqueleto, NÃO monta os DCs filhos.
      return { saveErro:this.state.saveErro, onDismissErro:this.on.dismissErro, ready:false, notReady:true, precisaLogin:false, loginVM:null, isCarteira:false, isObra:false, isFaturacao:false, isAprovacao:false, sidebarVM:null, carteiraVM:null, detalheVM:null, faturacaoVM:null, aprovacaoVM:null, autoModalOpen:false, autoModal:null, custoModalOpen:false, custoM:null, obraModalOpen:false, obraM:null, codModalOpen:false, codM:null, printAutoOpen:false, autoFolha:null };
    }
    const opts = {
      ACC: M.theme.accent(this.props.acentoCor),
      compact: this.props.densidade === 'Compacta',
      realLow: this.props.realcarMargemBaixa !== false,
      podeEditar: M.auth.podeEditar(this.state.sessao),
      podeApagarObra: M.auth.podeApagarObra(this.state.sessao),
      podeApagarAuto: M.auth.podeApagarAuto(this.state.sessao),
      podeFaturar: M.auth.podeFaturar(this.state.sessao),
      podeAprovar: M.auth.podeAprovar(this.state.sessao),
      veTudo: M.auth.veTudo(this.state.sessao),
      sessao: this.state.sessao,
    };

    // Sem sessão iniciada: só o ecrã de login.
    if(!this.state.sessao){
      return { saveErro:this.state.saveErro, onDismissErro:this.on.dismissErro, ready:false, notReady:false, precisaLogin:true, loginVM:M.buildLogin(this.state, opts, this.on),
        isCarteira:false, isObra:false, isFaturacao:false, isAprovacao:false, sidebarVM:null, carteiraVM:null, detalheVM:null, faturacaoVM:null, aprovacaoVM:null,
        autoModalOpen:false, autoModal:null, custoModalOpen:false, custoM:null, obraModalOpen:false, obraM:null, codModalOpen:false, codM:null, printAutoOpen:false, autoFolha:null };
    }

    const obras = this._obras(), st = this.state, on = this.on;

    const sidebarVM  = M.buildSidebar(obras, st, opts, on);
    const carteiraVM = st.view === 'carteira' ? M.buildCarteira(obras, st, opts, on) : null;
    const detalheVM  = st.view === 'obra' ? M.buildDetalhe(obras, st, opts, on) : null;
    const faturacaoVM = (st.view === 'faturacao' && opts.podeFaturar) ? M.buildFaturacao(obras, st, opts, on) : null;
    const aprovacaoVM = (st.view === 'aprovacao' && opts.podeAprovar) ? M.buildAprovacao(obras, st, opts, on) : null;
    const autoModal  = M.buildAutoModal(obras, st, opts, on);
    const custoM     = M.buildCustoModal(obras, st, opts, on);
    const obraM      = M.buildObraModal(obras, st, opts, on);
    const codM       = M.buildCodigoModal(obras, st, opts, on);
    const autoFolha  = M.buildAutoFolha(obras, st, opts, on);

    return {
      saveErro: this.state.saveErro, onDismissErro: this.on.dismissErro,
      ready: true, notReady: false, precisaLogin: false, loginVM: null,
      isCarteira: st.view === 'carteira', isObra: st.view === 'obra', isFaturacao: !!faturacaoVM, isAprovacao: !!aprovacaoVM,
      sidebarVM, carteiraVM, detalheVM, faturacaoVM, aprovacaoVM,
      autoModalOpen: !!autoModal, autoModal, custoModalOpen: !!custoM, custoM,
      obraModalOpen: !!obraM, obraM, codModalOpen: !!codM, codM,
      printAutoOpen: !!autoFolha, autoFolha,
    };
  }
}
</script>
</body>
</html>
